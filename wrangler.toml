name = "sub-tracker"
main = "api/index.ts"
compatibility_date = "2024-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# 每日 UTC 0:00（北京时间 08:00）执行到期提醒扫描
[triggers]
crons = ["10 10 * * *"]

# 部署后请手动在 Cloudflare Dashboard 配置以下绑定和 Secrets：
#
# 1. D1 Database 绑定（Settings → Bindings）
#    先在 D1 控制台创建数据库：npx wrangler d1 create sub-tracker
#    然后在 Workers Settings 中添加绑定：
#    Variable name: DB  →  Database: sub-tracker
#
# 2. Secrets（Settings → Variables and Secrets，类型选 "Encrypt"）
#    JWT_SECRET      至少 32 字符（用于 JWT 签名）
#    ENCRYPTION_KEY  至少 32 字符（用于 AES-GCM 字段加密）
#    MIGRATION_KEY   任意字符串（用于调用 /api/migrate 接口）
#
# 3. 数据库迁移（配置完成后执行）
#    npx wrangler d1 execute sub-tracker --remote --file=./migrations/001_initial.sql
#    npx wrangler d1 execute sub-tracker --remote --file=./migrations/002_encrypt_configs.sql
#    npx wrangler d1 execute sub-tracker --remote --file=./migrations/003_encrypt_all_fields.sql
#    npx wrangler d1 execute sub-tracker --remote --file=./migrations/004_add_extend_mode.sql
#    npx wrangler d1 execute sub-tracker --remote --file=./migrations/005_add_custom_renewal_days.sql
