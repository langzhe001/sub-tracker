name = "sub-tracker"
main = "api/index.ts"
compatibility_date = "2024-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

# 每日 UTC 0:00（北京时间 08:00）执行到期提醒扫描
[triggers]
crons = ["0 0 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "sub-tracker"
# 部署前请将 database_id 替换为你账号下的真实数据库 ID
# 执行: npx wrangler d1 create sub-tracker
database_id = "replace-with-your-d1-database-id"

# 敏感密钥请勿写在此处（公开仓库不安全），请用 Secret 设置：
#   npx wrangler secret put JWT_SECRET
#   npx wrangler secret put ENCRYPTION_KEY
#   npx wrangler secret put MIGRATION_KEY
# 或在 Cloudflare Dashboard → Workers → Settings → Variables → Secrets 中添加
#
# 密钥要求：JWT_SECRET 和 ENCRYPTION_KEY 至少 32 个字符
